<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="login">
        <h1>Student Exam Performance Indicator</h1>
        <form action="{{url_for('predict_datapoint')}}" method="post">
            <h1>
                <legend>Input the Features</legend>
            </h1>
            <div class="mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select name="gender" id="gender" class="form-control" placeholder="Enter your gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="parental level of education" class="form-label">Parental level of education</label>
                <select name="parental level of education" id="parental level of education" class="form-control"
                    placeholder="Enter your parental level of education">
                    <option value="bachelor's degree">bachelor's degree</option>
                    <option value="some college">some college</option>
                    <option value="master's degree">master's degree</option>
                    <option value="associate's degree">associate's degree</option>
                    <option value="high school">high school</option>
                    <option value="some high school">some high school</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="lunch" class="form-label">Lunch</label>
                <select name="lunch" id="lunch" class="form-control" placeholder="Enter your lunch">
                    <option value="standard">standard</option>
                    <option value="free/reduced">free/reduced</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="test preparation course" class="form-label">Test preparation course</label>
                <select name="test preparation course" id="test preparation course" class="form-control"
                    placeholder="Enter your test preparation course">
                    <option value="completed">completed</option>
                    <option value="none">none</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="race/ethnicity" class="form-label">Race/Ethnicity</label>
                <select name="race/ethnicity" id="race/ethnicity" class="form-control"
                    placeholder="Enter your parental level of education">
                    <option value="group A">group A</option>
                    <option value="group B">group B</option>
                    <option value="group C">group C</option>
                    <option value="group D">group D</option>
                    <option value="group E">group E</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="reading score">Reading Score out of 100</label>
                <input type="text" name="reading score" id="reading score" placeholder="enter your reading score">
            </div>
            <div class="mb-3">
                <label for="writing score">Writing Score out of 100</label>
                <input type="text" name="writing score" id="writing score" placeholder="enter your writing score">
            </div>
            <div class="mb-3">
                <input type="submit" value="Predict your Math Score" class="btn btn-primary">
            </div>
        </form>

        <h2>
            The Predicted Math score is {{results}}
        </h2>
    </div>
</body>

</html>
